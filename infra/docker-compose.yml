name: webhook-reliability-integration-monitor

services:
  postgres:
    image: postgres:16-alpine
    container_name: webhook-monitor-postgres
    environment:
      POSTGRES_USER: webhook_monitor
      POSTGRES_PASSWORD: webhook_monitor_password
      POSTGRES_DB: webhook_monitor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U webhook_monitor -d webhook_monitor"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: webhook-monitor-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

volumes:
  postgres_data:
  redis_data:
